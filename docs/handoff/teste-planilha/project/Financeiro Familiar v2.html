<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Financeiro Familiar v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="ff2-base.jsx"></script>
<script type="text/babel" src="ff2-dashboard.jsx"></script>
<script type="text/babel" src="ff2-screens.jsx"></script>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { font-family:'Plus Jakarta Sans', sans-serif; }

:root {
  --bg:oklch(97% 0.008 220); --bg2:oklch(93% 0.012 220);
  --surface:#ffffff; --surface2:oklch(96% 0.006 220);
  --border:oklch(88% 0.01 220); --border-strong:oklch(80% 0.015 220);
  --text:oklch(18% 0.02 255); --text2:oklch(45% 0.02 255); --text3:oklch(60% 0.01 255);
  --primary:oklch(55% 0.18 185); --primary-light:oklch(94% 0.06 185); --primary-dim:oklch(55% 0.18 185 / 0.14);
  --accent:oklch(72% 0.18 75); --accent-light:oklch(96% 0.06 75);
  --success:oklch(58% 0.18 145); --success-light:oklch(94% 0.06 145);
  --danger:oklch(55% 0.22 25); --danger-light:oklch(95% 0.06 25);
  --warning:oklch(68% 0.18 75); --warning-light:oklch(96% 0.06 75);
  --shadow-sm:0 1px 4px oklch(0% 0 0/0.06),0 0 0 1px oklch(0% 0 0/0.04);
  --shadow-md:0 4px 16px oklch(0% 0 0/0.08),0 0 0 1px oklch(0% 0 0/0.04);
  --shadow-lg:0 8px 32px oklch(0% 0 0/0.14);
  --radius:16px; --radius-sm:10px; --radius-xs:6px;
}
[data-theme="dark"] {
  --bg:oklch(13% 0.02 260); --bg2:oklch(17% 0.025 260);
  --surface:oklch(19% 0.025 260); --surface2:oklch(22% 0.022 260);
  --border:oklch(28% 0.025 260); --border-strong:oklch(36% 0.025 260);
  --text:oklch(93% 0.01 260); --text2:oklch(70% 0.015 260); --text3:oklch(52% 0.012 260);
  --primary:oklch(65% 0.18 185); --primary-light:oklch(30% 0.08 185); --primary-dim:oklch(65% 0.18 185/0.18);
  --accent:oklch(78% 0.18 75); --accent-light:oklch(28% 0.08 75);
  --success:oklch(65% 0.18 145); --success-light:oklch(25% 0.08 145);
  --danger:oklch(65% 0.22 25); --danger-light:oklch(25% 0.08 25);
  --warning:oklch(74% 0.18 75); --warning-light:oklch(28% 0.08 75);
  --shadow-sm:0 1px 4px oklch(0% 0 0/0.3); --shadow-md:0 4px 16px oklch(0% 0 0/0.35); --shadow-lg:0 8px 32px oklch(0% 0 0/0.45);
}
[data-theme="eva"] {
  --bg:oklch(10% 0.04 295); --bg2:oklch(14% 0.05 295);
  --surface:oklch(17% 0.06 295); --surface2:oklch(21% 0.055 295);
  --border:oklch(30% 0.06 295); --border-strong:oklch(40% 0.07 295);
  --text:oklch(92% 0.02 295); --text2:oklch(72% 0.04 295); --text3:oklch(55% 0.03 295);
  --primary:oklch(60% 0.22 295); --primary-light:oklch(25% 0.1 295); --primary-dim:oklch(60% 0.22 295/0.18);
  --accent:oklch(80% 0.25 135); --accent-light:oklch(22% 0.1 135);
  --success:oklch(72% 0.25 135); --success-light:oklch(22% 0.1 135);
  --danger:oklch(65% 0.24 20); --danger-light:oklch(22% 0.08 20);
  --warning:oklch(80% 0.22 90); --warning-light:oklch(24% 0.08 90);
  --shadow-sm:0 1px 4px oklch(0% 0 0/0.4); --shadow-md:0 4px 16px oklch(0% 0 0/0.45),0 0 0 1px var(--border); --shadow-lg:0 8px 32px oklch(0% 0 0/0.55);
}

body { background:var(--bg); color:var(--text); min-height:100vh; transition:background .25s,color .25s; }
#root { min-height:100vh; }
::selection { background:var(--primary-dim); }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:99px; }
@keyframes slideInLeft { from{transform:translateX(-100%);opacity:.5} to{transform:translateX(0);opacity:1} }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Navigation map ────────────────────────────────────────────
const NAV_GROUPS = [
  {
    id:'overview', label:'Visão Geral',
    items:[
      { id:'dashboard', label:'Dashboard',        icon:'dashboard' },
      { id:'reports',   label:'Relatórios',        icon:'reports'   },
      { id:'planning',  label:'Planejamento Anual',icon:'planning'  },
    ]
  },
  {
    id:'finance', label:'Finanças',
    items:[
      { id:'planilha',    label:'Planilha',     icon:'grid'       },
      { id:'reconcile',   label:'Conciliação',  icon:'reconcile'  },
    ]
  },
  {
    id:'control', label:'Controle',
    items:[
      { id:'budget',        label:'Orçamentos',         icon:'budget'       },
      { id:'goals',         label:'Metas',               icon:'goal'         },
      { id:'subscriptions', label:'Assinaturas',         icon:'subscription' },
    ]
  },
  {
    id:'commitments', label:'Compromissos',
    items:[
      { id:'debts',     label:'Dívidas e Parcelas', icon:'debt'     },
      { id:'patrimony', label:'Patrimônio',          icon:'patrimony'},
    ]
  },
  {
    id:'analysis', label:'Análise',
    items:[
      { id:'scenarios', label:'Cenários',             icon:'scenario'},
      { id:'alerts',    label:'Alertas Inteligentes', icon:'alerts'  },
    ]
  },
];

const BOTTOM_ITEMS = [
  { id:'dashboard',    label:'Dashboard', icon:'dashboard' },
  { id:'budget',       label:'Orçamentos',icon:'budget'    },
  { id:'goals',        label:'Metas',     icon:'goal'      },
  { id:'alerts',       label:'Alertas',   icon:'alerts'    },
];

const SETTINGS_ITEM = { id:'config', label:'Configurações', icon:'settings' };
const DS_ITEM = { id:'design-system', label:'Design System', icon:'sparkle' };

const ALL_ITEMS = [...NAV_GROUPS.flatMap(g=>g.items), SETTINGS_ITEM, DS_ITEM];

const MONTH_FULL = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const now = new Date();

// ── Planilha stub (reuses the existing one's shell) ───────────
const PlanilhaStub = () => (
  <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
    <AlertBanner alerts={[{tone:'info', title:'Planilha editável', body:'Clique em qualquer célula para editar. Use filtros para navegar rapidamente.'}]} />
    <div style={{ background:'var(--surface)', borderRadius:'var(--radius)', border:'1px solid var(--border)', padding:20, textAlign:'center' }}>
      <p style={{ fontSize:13, color:'var(--text3)' }}>Planilha completa disponível na versão v1</p>
      <div style={{ marginTop:12, display:'flex', gap:10, justifyContent:'center', flexWrap:'wrap' }}>
        <Btn variant="primary" icon="plus">Novo lançamento</Btn>
        <Btn variant="ghost" icon="export">Exportar</Btn>
        <Btn variant="ghost" icon="refresh">Regenerar recorrências</Btn>
      </div>
    </div>
    <Panel title="Lançamentos recentes — Maio 2026" noPad>
      {[
        {title:'Salário Pedro', amount:1000, kind:'income', status:'paid', date:'2026-05-01'},
        {title:'Aluguel + Cond.', amount:1700, kind:'expense', status:'paid', date:'2026-05-05'},
        {title:'Flash VR', amount:800, kind:'income', status:'paid', date:'2026-05-01'},
        {title:'Nubank Pedro', amount:589.90, kind:'expense', status:'pending', date:'2026-05-10'},
        {title:'Sicredi Pedro', amount:484.75, kind:'expense', status:'pending', date:'2026-05-15'},
        {title:'Energia', amount:260, kind:'expense', status:'pending', date:'2026-05-18'},
      ].map((e,i)=>(
        <div key={i} style={{ display:'flex', alignItems:'center', gap:12, padding:'11px 16px', borderBottom:'1px solid var(--border)' }}>
          <span style={{ fontSize:12, fontWeight:700, color:e.kind==='income'?'var(--success)':'var(--danger)' }}>{e.kind==='income'?'+':'-'}</span>
          <div style={{ flex:1 }}>
            <p style={{ fontSize:13, fontWeight:600, color:'var(--text)' }}>{e.title}</p>
            <p style={{ fontSize:11, color:'var(--text3)' }}>{fmtDate(e.date)}</p>
          </div>
          <span style={{ fontSize:13, fontWeight:800, color:e.kind==='income'?'var(--success)':'var(--danger)' }}>{fmt(e.amount)}</span>
          <Badge tone={e.status==='paid'?'success':'warning'}>{e.status==='paid'?'Pago':'Pendente'}</Badge>
        </div>
      ))}
    </Panel>
  </div>
);

// ── Sidebar ───────────────────────────────────────────────────
const Sidebar = ({ active, onNav, collapsed, onToggle, alertCount }) => {
  const [openGroups, setOpenGroups] = useState(['overview','finance','control','commitments','analysis']);
  const toggleGroup = id => setOpenGroups(g => g.includes(id) ? g.filter(x=>x!==id) : [...g,id]);

  return (
    <aside style={{ width:collapsed?68:240, minHeight:'100vh', position:'sticky', top:0, flexShrink:0, display:'flex', flexDirection:'column', background:'var(--surface)', borderRight:'1px solid var(--border)', boxShadow:'var(--shadow-sm)', transition:'width .25s cubic-bezier(.4,0,.2,1)', overflow:'hidden', zIndex:100 }}>

      {/* Logo */}
      <div style={{ display:'flex', alignItems:'center', gap:10, padding:'0 14px', borderBottom:'1px solid var(--border)', height:56, flexShrink:0, overflow:'hidden' }}>
        <div style={{ width:32, height:32, borderRadius:9, background:'var(--primary)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          <Icon name="balance" size={17} color="#fff" />
        </div>
        <div style={{ overflow:'hidden', whiteSpace:'nowrap', opacity:collapsed?0:1, transition:'opacity .15s', pointerEvents:collapsed?'none':'auto' }}>
          <p style={{ fontSize:9, color:'var(--text3)', fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase' }}>Financeiro</p>
          <p style={{ fontSize:14, fontWeight:800, color:'var(--text)' }}>Familiar</p>
        </div>
      </div>

      {/* Nav */}
      <nav style={{ flex:1, padding:'8px 6px', overflowY:'auto', overflowX:'hidden' }}>
        {NAV_GROUPS.map(group => (
          <div key={group.id} style={{ marginBottom:4 }}>
            {/* Group header */}
            {!collapsed && (
              <button onClick={()=>toggleGroup(group.id)} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', width:'100%', padding:'5px 8px', background:'none', border:'none', cursor:'pointer', color:'var(--text3)', fontFamily:'Plus Jakarta Sans', marginBottom:1 }}>
                <span style={{ fontSize:9, fontWeight:800, letterSpacing:'0.1em', textTransform:'uppercase' }}>{group.label}</span>
                <span style={{ display:'flex', transition:'transform .2s', transform:openGroups.includes(group.id)?'rotate(0)':'rotate(-90deg)' }}><Icon name="chevron_down" size={12} /></span>
              </button>
            )}
            {/* Items */}
            {(collapsed || openGroups.includes(group.id)) && group.items.map(item => {
              const isActive = active===item.id;
              const isAlerts = item.id==='alerts';
              return (
                <button key={item.id} onClick={()=>onNav(item.id)} title={collapsed?item.label:''} style={{ display:'flex', alignItems:'center', gap:9, padding: collapsed?'9px 0':'8px 10px', justifyContent:collapsed?'center':'flex-start', borderRadius:'var(--radius-xs)', border:'none', cursor:'pointer', fontFamily:'Plus Jakarta Sans', fontWeight:600, fontSize:13, background:isActive?'var(--primary-dim)':'transparent', color:isActive?'var(--primary)':'var(--text2)', transition:'background .12s, color .12s', width:'100%', position:'relative', overflow:'hidden', whiteSpace:'nowrap' }}
                  onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background='var(--surface2)';}}
                  onMouseLeave={e=>{if(!isActive)e.currentTarget.style.background='transparent';}}>
                  {isActive && <span style={{ position:'absolute', left:0, top:'20%', bottom:'20%', width:3, borderRadius:99, background:'var(--primary)' }} />}
                  <span style={{ position:'relative', flexShrink:0 }}>
                    <Icon name={item.icon} size={16} color={isActive?'var(--primary)':'currentColor'} />
                    {isAlerts && alertCount>0 && (
                      <span style={{ position:'absolute', top:-4, right:-4, width:14, height:14, borderRadius:'50%', background:'var(--danger)', border:'2px solid var(--surface)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:8, fontWeight:800, color:'#fff' }}>{alertCount}</span>
                    )}
                  </span>
                  <span style={{ opacity:collapsed?0:1, maxWidth:collapsed?0:160, transition:'opacity .15s, max-width .25s cubic-bezier(.4,0,.2,1)', overflow:'hidden' }}>{item.label}</span>
                </button>
              );
            })}
            {!collapsed && <div style={{ height:4 }} />}
          </div>
        ))}
      </nav>

      {/* Bottom */}
      <div style={{ borderTop:'1px solid var(--border)', padding:'8px 6px', display:'flex', flexDirection:'column', gap:2 }}>
        {[DS_ITEM, SETTINGS_ITEM].map(item => {
          const isActive = active===item.id;
          return (
            <button key={item.id} onClick={()=>onNav(item.id)} title={collapsed?item.label:''} style={{ display:'flex', alignItems:'center', gap:9, padding:collapsed?'9px 0':'8px 10px', justifyContent:collapsed?'center':'flex-start', borderRadius:'var(--radius-xs)', border:'none', cursor:'pointer', fontFamily:'Plus Jakarta Sans', fontWeight:600, fontSize:13, background:isActive?'var(--primary-dim)':'transparent', color:isActive?'var(--primary)':'var(--text2)', transition:'background .12s, color .12s', width:'100%', whiteSpace:'nowrap', overflow:'hidden' }}
              onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background='var(--surface2)';}}
              onMouseLeave={e=>{if(!isActive)e.currentTarget.style.background='transparent';}}>
              <Icon name={item.icon} size={16} color={isActive?'var(--primary)':'currentColor'} />
              <span style={{ opacity:collapsed?0:1, maxWidth:collapsed?0:160, transition:'opacity .15s, max-width .25s cubic-bezier(.4,0,.2,1)', overflow:'hidden' }}>{item.label}</span>
            </button>
          );
        })}

        {/* Net worth badge */}
        {!collapsed && (
          <div style={{ margin:'4px 4px 0', padding:'9px 10px', borderRadius:'var(--radius-xs)', background:'var(--primary-dim)', border:'1px solid var(--primary)' }}>
            <p style={{ fontSize:9, color:'var(--primary)', fontWeight:800, textTransform:'uppercase', letterSpacing:'0.08em', marginBottom:2 }}>{MONTH_FULL[now.getMonth()]}</p>
            <p style={{ fontSize:14, fontWeight:800, color:'var(--primary)' }}>{fmt(620)}</p>
            <p style={{ fontSize:9, color:'var(--primary)', opacity:0.7 }}>saldo líquido</p>
          </div>
        )}

        {/* Collapse */}
        <button onClick={onToggle} style={{ display:'flex', alignItems:'center', gap:8, justifyContent:collapsed?'center':'flex-start', padding:'8px 10px', borderRadius:'var(--radius-xs)', border:'none', cursor:'pointer', background:'transparent', color:'var(--text3)', fontFamily:'Plus Jakarta Sans', fontSize:12, fontWeight:600, width:'100%', transition:'background .12s', whiteSpace:'nowrap', overflow:'hidden' }}
          onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <span style={{ display:'flex', flexShrink:0, transition:'transform .25s cubic-bezier(.4,0,.2,1)', transform:collapsed?'rotate(180deg)':'none' }}>
            <Icon name="chevron_left" size={15} />
          </span>
          <span style={{ opacity:collapsed?0:1, maxWidth:collapsed?0:120, transition:'opacity .15s, max-width .25s cubic-bezier(.4,0,.2,1)', overflow:'hidden' }}>Recolher</span>
        </button>
      </div>
    </aside>
  );
};

// ── App ───────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"theme":"light","density":"compact"}/*EDITMODE-END*/;

const App = () => {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [active, setActive] = useState('dashboard');
  const [collapsed, setCollapsed] = useState(false);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [moreOpen, setMoreOpen] = useState(false);
  const [isMobile, setIsMobile] = useState(()=>window.innerWidth<768);

  useEffect(()=>{ document.documentElement.setAttribute('data-theme', t.theme); }, [t.theme]);
  useEffect(()=>{ const h=()=>setIsMobile(window.innerWidth<768); window.addEventListener('resize',h); return()=>window.removeEventListener('resize',h); },[]);

  const goTo = id => { setActive(id); setDrawerOpen(false); setMoreOpen(false); };
  const alertCount = 3;
  const currentItem = ALL_ITEMS.find(i=>i.id===active) || ALL_ITEMS[0];

  const renderScreen = () => {
    switch(active) {
      case 'dashboard':    return <DashboardScreen onNavigate={goTo} />;
      case 'planilha':     return <PlanilhaStub />;
      case 'budget':       return <OrcamentosScreen />;
      case 'goals':        return <MetasScreen />;
      case 'subscriptions':return <AssinaturasScreen />;
      case 'debts':        return <DividasScreen />;
      case 'patrimony':    return <PatrimonioScreen />;
      case 'planning':     return <PlanejamentoScreen />;
      case 'scenarios':    return <CenariosScreen />;
      case 'reports':      return <RelatoriosScreen />;
      case 'reconcile':    return <ConciliacaoScreen />;
      case 'alerts':       return <AlertasScreen />;
      case 'design-system':return <DesignSystemScreen />;
      case 'config':       return <ConfiguracoesScreen theme={t.theme} setTheme={v=>setTweak('theme',v)} />;
      default:             return <EmptyState icon="info" title="Em desenvolvimento" body="Este módulo estará disponível em breve." />;
    }
  };

  // ── Mobile drawer sidebar ─────────────────────────────────
  const MobileDrawer = () => (
    <div style={{ position:'fixed', inset:0, zIndex:300, display:'flex' }} onClick={()=>setDrawerOpen(false)}>
      <div style={{ position:'absolute', inset:0, background:'oklch(0% 0 0/0.45)', backdropFilter:'blur(2px)' }} />
      <div style={{ position:'relative', width:280, height:'100%', background:'var(--surface)', borderRight:'1px solid var(--border)', boxShadow:'var(--shadow-lg)', zIndex:1, display:'flex', flexDirection:'column', animation:'slideInLeft .22s cubic-bezier(.4,0,.2,1)', overflowY:'auto' }} onClick={e=>e.stopPropagation()}>
        {/* Logo */}
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'0 16px', borderBottom:'1px solid var(--border)', height:56, flexShrink:0 }}>
          <div style={{ width:32, height:32, borderRadius:9, background:'var(--primary)', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <Icon name="balance" size={17} color="#fff" />
          </div>
          <div><p style={{ fontSize:9, color:'var(--text3)', fontWeight:700, letterSpacing:'0.12em', textTransform:'uppercase' }}>Financeiro</p><p style={{ fontSize:14, fontWeight:800, color:'var(--text)' }}>Familiar</p></div>
        </div>
        <nav style={{ flex:1, padding:'8px 8px' }}>
          {NAV_GROUPS.map(group=>(
            <div key={group.id} style={{ marginBottom:8 }}>
              <p style={{ fontSize:9, fontWeight:800, color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.1em', padding:'4px 8px', marginBottom:2 }}>{group.label}</p>
              {group.items.map(item=>{
                const isActive = active===item.id;
                return (
                  <button key={item.id} onClick={()=>goTo(item.id)} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 10px', borderRadius:'var(--radius-sm)', border:'none', cursor:'pointer', fontFamily:'Plus Jakarta Sans', fontWeight:600, fontSize:14, background:isActive?'var(--primary-dim)':'transparent', color:isActive?'var(--primary)':'var(--text2)', transition:'background .12s', width:'100%', position:'relative' }}
                    onMouseEnter={e=>{if(!isActive)e.currentTarget.style.background='var(--surface2)';}}
                    onMouseLeave={e=>{if(!isActive)e.currentTarget.style.background='transparent';}}>
                    {isActive&&<span style={{ position:'absolute', left:0, top:'20%', bottom:'20%', width:3, borderRadius:99, background:'var(--primary)' }} />}
                    <Icon name={item.icon} size={18} color={isActive?'var(--primary)':'currentColor'} />
                    {item.label}
                    {item.id==='alerts'&&alertCount>0&&<Badge tone="danger" style={{ marginLeft:'auto' }}>{alertCount}</Badge>}
                  </button>
                );
              })}
            </div>
          ))}
        </nav>
        <div style={{ borderTop:'1px solid var(--border)', padding:'8px 8px' }}>
          {[DS_ITEM,SETTINGS_ITEM].map(item=>(
            <button key={item.id} onClick={()=>goTo(item.id)} style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 10px', borderRadius:'var(--radius-sm)', border:'none', cursor:'pointer', fontFamily:'Plus Jakarta Sans', fontWeight:600, fontSize:14, background:active===item.id?'var(--primary-dim)':'transparent', color:active===item.id?'var(--primary)':'var(--text2)', width:'100%', transition:'background .12s' }}><Icon name={item.icon} size={18} />{item.label}</button>
          ))}
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ minHeight:'100vh', background:'var(--bg)', color:'var(--text)', display:'flex' }}>

      {/* Desktop sidebar */}
      {!isMobile && <Sidebar active={active} onNav={goTo} collapsed={collapsed} onToggle={()=>setCollapsed(c=>!c)} alertCount={alertCount} />}

      {/* Mobile drawer */}
      {isMobile && drawerOpen && <MobileDrawer />}

      {/* Main */}
      <div style={{ flex:1, minWidth:0, display:'flex', flexDirection:'column' }}>

        {/* Top bar */}
        <div style={{ height:56, display:'flex', alignItems:'center', gap:12, padding:'0 20px', borderBottom:'1px solid var(--border)', background:'var(--surface)', boxShadow:'var(--shadow-sm)', position:'sticky', top:0, zIndex:90, flexShrink:0 }}>
          {isMobile && (
            <button onClick={()=>setDrawerOpen(o=>!o)} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text)', display:'flex', padding:6, borderRadius:8, position:'relative' }}
              onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
              onMouseLeave={e=>e.currentTarget.style.background='none'}>
              <Icon name="menu" size={20} />
              {alertCount>0 && <span style={{ position:'absolute', top:2, right:2, width:10, height:10, borderRadius:'50%', background:'var(--danger)', border:'2px solid var(--surface)' }} />}
            </button>
          )}
          <div style={{ flex:1, minWidth:0 }}>
            <h1 style={{ fontSize:15, fontWeight:800, color:'var(--text)', lineHeight:1.2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{currentItem.label}</h1>
            {!isMobile && <p style={{ fontSize:11, color:'var(--text3)' }}>{MONTH_FULL[now.getMonth()]} de {now.getFullYear()}</p>}
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:8, flexShrink:0 }}>
            {!isMobile && (
              <>
                <span style={{ fontSize:12, color:'var(--text3)', fontWeight:600 }}>↑ <span style={{ color:'var(--success)' }}>{fmt(3900)}</span> &nbsp;↓ <span style={{ color:'var(--danger)' }}>{fmt(3280)}</span></span>
              </>
            )}
            <button onClick={()=>goTo('alerts')} style={{ background:'none', border:'none', cursor:'pointer', color:'var(--text2)', display:'flex', padding:6, borderRadius:8, position:'relative' }}
              onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
              onMouseLeave={e=>e.currentTarget.style.background='none'}>
              <Icon name="alerts" size={20} />
              {alertCount>0 && <span style={{ position:'absolute', top:2, right:2, width:16, height:16, borderRadius:'50%', background:'var(--danger)', border:'2px solid var(--surface)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, fontWeight:800, color:'#fff' }}>{alertCount}</span>}
            </button>
            <div style={{ padding:'4px 10px', borderRadius:99, background:'var(--primary-dim)', border:'1px solid var(--primary)' }}>
              <span style={{ fontSize:12, fontWeight:800, color:'var(--primary)' }}>{fmt(620)}</span>
            </div>
          </div>
        </div>

        {/* Content */}
        <main key={active} style={{ flex:1, padding: isMobile?'16px 12px 80px':'24px', maxWidth:1280, width:'100%', margin:'0 auto', animation:'fadeIn .18s ease' }}>
          {renderScreen()}
        </main>
      </div>

      {/* Mobile bottom nav */}
      {isMobile && (
        <nav style={{ position:'fixed', bottom:0, left:0, right:0, zIndex:150, background:'var(--surface)', borderTop:'1px solid var(--border)', boxShadow:'0 -4px 20px oklch(0% 0 0/0.1)', display:'flex', paddingBottom:'env(safe-area-inset-bottom,0px)' }}>
          {BOTTOM_ITEMS.map(item=>{
            const isActive = active===item.id;
            return (
              <button key={item.id} onClick={()=>goTo(item.id)} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:3, padding:'10px 4px 8px', border:'none', cursor:'pointer', background:'transparent', color:isActive?'var(--primary)':'var(--text3)', fontFamily:'Plus Jakarta Sans', fontSize:9, fontWeight:700, transition:'color .12s', position:'relative' }}>
                {isActive && <span style={{ position:'absolute', top:0, left:'20%', right:'20%', height:2, borderRadius:99, background:'var(--primary)' }} />}
                <span style={{ position:'relative' }}>
                  <Icon name={item.icon} size={22} color={isActive?'var(--primary)':'currentColor'} />
                  {item.id==='alerts'&&alertCount>0&&<span style={{ position:'absolute', top:-3, right:-4, width:13, height:13, borderRadius:'50%', background:'var(--danger)', border:'2px solid var(--surface)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:7, fontWeight:800, color:'#fff' }}>{alertCount}</span>}
                </span>
                {item.label}
              </button>
            );
          })}
          <button onClick={()=>setDrawerOpen(true)} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:3, padding:'10px 4px 8px', border:'none', cursor:'pointer', background:'transparent', color:'var(--text3)', fontFamily:'Plus Jakarta Sans', fontSize:9, fontWeight:700 }}>
            <Icon name="menu" size={22} />
            Mais
          </button>
        </nav>
      )}

      {/* Tweaks */}
      <TweaksPanel>
        <TweakSection label="Tema" />
        <TweakRadio label="Visual" value={t.theme} options={['light','dark','eva']} onChange={v=>setTweak('theme',v)} />
        <TweakSection label="Densidade" />
        <TweakRadio label="Modo" value={t.density} options={['compact','comfortable']} onChange={v=>setTweak('density',v)} />
      </TweaksPanel>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
