name: Atualização OTA

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_notes:
        description: Novidades exibidas no aplicativo
        required: false
        type: string

concurrency:
  group: capgo-production
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
      OTA_RELEASE_NOTES: ${{ inputs.release_notes || github.event.head_commit.message || 'Melhorias e correções de estabilidade.' }}
      NUXT_PUBLIC_API_BASE_URL: ${{ vars.NUXT_PUBLIC_API_BASE_URL }}
      NUXT_PUBLIC_SUPABASE_URL: ${{ vars.NUXT_PUBLIC_SUPABASE_URL }}
      NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NUXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Verificar configuração do Capgo
        id: capgo
        run: |
          if [ -n "$CAPGO_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.capgo.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.capgo.outputs.configured == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Instalar e validar
        if: steps.capgo.outputs.configured == 'true'
        run: |
          npm ci
          npm run typecheck

      - name: Gerar pacote web de produção
        if: steps.capgo.outputs.configured == 'true'
        run: npm run generate

      - name: Publicar atualização na produção
        if: steps.capgo.outputs.configured == 'true'
        run: npx @capgo/cli@latest bundle upload --apikey "$CAPGO_TOKEN" --channel production --bundle "1.0.${{ github.run_number }}" --comment "$OTA_RELEASE_NOTES" --no-delta --fail-on-incompatible
