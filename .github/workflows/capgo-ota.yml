name: Atualização OTA

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: capgo-production
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
      NUXT_PUBLIC_API_BASE_URL: ${{ vars.NUXT_PUBLIC_API_BASE_URL }}
      NUXT_PUBLIC_SUPABASE_URL: ${{ vars.NUXT_PUBLIC_SUPABASE_URL }}
      NUXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NUXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - name: Verificar configuração do Capgo
        id: capgo
        run: echo "configured=$([ -n \"$CAPGO_TOKEN\" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.capgo.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.capgo.outputs.configured == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Instalar e validar
        if: steps.capgo.outputs.configured == 'true'
        run: |
          npm ci
          npm run typecheck

      - name: Gerar pacote web de produção
        if: steps.capgo.outputs.configured == 'true'
        run: npm run generate

      - name: Publicar atualização na produção
        if: steps.capgo.outputs.configured == 'true'
        run: npx @capgo/cli@latest bundle upload --apikey "$CAPGO_TOKEN" --channel production --delta
